name: Heart Disease MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  IMAGE_NAME: heart-disease-api
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Lint & Code Quality ────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: |
          pip install flake8 black isort

      - name: Run flake8 (linting)
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E203,W503 \
            --exclude=__pycache__ || (echo "❌ Linting failed!" && exit 1)

      - name: Check black formatting
        run: |
          black --check --diff src/ tests/ || (echo "❌ Code not formatted!" && exit 1)

      - name: Check import ordering
        run: |
          isort --check-only src/ tests/ || (echo "❌ Imports not sorted!" && exit 1)

  # ── Job 2: Unit Tests ─────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        run: |
          python -c "
          import urllib.request, io, pandas as pd
          url = 'https://archive.ics.uci.edu/ml/machine-learning-databases/heart-disease/processed.cleveland.data'
          cols = ['age','sex','cp','trestbps','chol','fbs','restecg','thalach','exang','oldpeak','slope','ca','thal','target']
          with urllib.request.urlopen(url) as r:
              raw = r.read().decode()
          df = pd.read_csv(io.StringIO(raw), header=None, names=cols, na_values='?')
          df['target'] = (df['target'] > 0).astype(int)
          import os; os.makedirs('data', exist_ok=True)
          df.to_csv('data/heart.csv', index=False)
          print(f'Dataset: {df.shape}')
          "

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml \
            --cov=src --cov-report=xml --cov-report=term-missing || \
            (echo "❌ Tests failed! Check logs above." && exit 1)

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Model Training Validation ─────────────────────────────────────
  model-training:
    name: Model Training & Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: |
          python src/train.py || (echo "❌ Training failed!" && exit 1)

      - name: Validate model artifact
        run: |
          python -c "
          import joblib, os
          assert os.path.exists('models/best_model.joblib'), 'Model file missing!'
          model = joblib.load('models/best_model.joblib')
          assert hasattr(model, 'predict'), 'Model has no predict method!'
          assert hasattr(model, 'predict_proba'), 'Model has no predict_proba!'
          print('✅ Model artifact validated.')
          "

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/best_model.joblib
          retention-days: 30

  # ── Job 4: Docker Build & Test ────────────────────────────────────────────
  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: model-training
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:test . || \
            (echo "❌ Docker build failed!" && exit 1)

      - name: Start container & test
        run: |
          docker run -d --name api-test -p 8000:8000 ${{ env.IMAGE_NAME }}:test
          sleep 15
          curl -f http://localhost:8000/health || (docker logs api-test && exit 1)
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":52,"sex":1,"cp":3,"trestbps":125,"chol":212,"fbs":0,"restecg":1,"thalach":168,"exang":0,"oldpeak":1.0,"slope":2,"ca":2,"thal":3}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'prediction' in d; print('✅ API test passed')"

      - name: Stop test container
        if: always()
        run: docker rm -f api-test || true

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.IMAGE_NAME }}:test \
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          echo "✅ Image pushed to registry"

  # ── Job 5: Notify ─────────────────────────────────────────────────────────
  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, model-training, docker-build]
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.docker-build.result }}" == "success" ]; then
            echo "✅ Full MLOps pipeline succeeded!"
          else
            echo "❌ Pipeline failed. Check job logs."
            exit 1
          fi
