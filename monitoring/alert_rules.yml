groups:
  - name: heart_disease_api_alerts
    rules:
      # API downtime alert
      - alert: APIDown
        expr: up{job="heart-disease-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Heart Disease API is down"
          description: "API has been unreachable for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: |
          rate(heart_api_requests_total{status=~"5.."}[5m]) /
          rate(heart_api_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate (>5%)"

      # High latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(heart_api_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "95th percentile latency exceeds 2 seconds"

      # Low prediction confidence (possible data drift)
      - alert: LowPredictionConfidence
        expr: |
          histogram_quantile(0.5, rate(heart_confidence_score_bucket[10m])) < 0.55
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Median prediction confidence is low — potential data drift"
          description: "Median confidence has dropped below 0.55 for 10 minutes."
